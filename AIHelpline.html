<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helpline — MineTrade Interactive</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="Images/favicon.ico" type="image/x-icon" />
  <style>
    .page-head { max-width: 760px; margin: 0 auto; padding: 48px 20px 6px; text-align: center; }
    .page-head p { max-width: 480px; margin: 8px auto 0; font-size: 0.9rem; }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px 70px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .presets { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .preset-btn {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line-bright);
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease;
    }
    .preset-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    .chat-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-message { padding: 11px 15px; border-radius: var(--radius-sm); max-width: 80%; word-wrap: break-word; font-size: 0.92rem; }

    .user-msg { background: var(--cyan-soft); color: var(--cyan); align-self: flex-end; }
    .ai-msg { background: var(--panel-raised); color: var(--ink); align-self: flex-start; border: 1px solid var(--line); }

    .fallback-buttons { display: none; justify-content: center; gap: 14px; }

    @media (max-width: 600px) {
      .preset-btn { padding: 8px 13px; font-size: 0.85rem; }
      .chat-box { min-height: 150px; }
    }
  </style>
</head>
<body>

  <header class="top-bar">
    <a href="index.html" class="back-link" aria-label="Back to Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Home
    </a>
    <a href="index.html" class="brand"><span class="mark">⛏</span>&nbsp;MineTrade<span class="dot">.</span></a>
    <span style="width:60px;"></span>
  </header>

  <div class="page-head">
    <span class="eyebrow">Helpline</span>
    <h1>What do you need help with?</h1>
    <p>Pick the closest match below. This is a guided directory, not a live AI — for anything it can't answer, Discord gets you a real person.</p>
  </div>

  <main>
    <div class="presets">
      <button class="preset-btn" data-issue="Gameplay Question">Gameplay question</button>
      <button class="preset-btn" data-issue="Payment Problem">Payment problem</button>
      <button class="preset-btn" data-issue="Game Bug">Report a bug</button>
      <button class="preset-btn" data-issue="Technical Help">Technical help</button>
      <button class="preset-btn" data-issue="Other Inquiry">Something else</button>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="ai-msg chat-message">Hi! Choose what's going on above and I'll point you in the right direction.</div>
    </div>

    <div class="fallback-buttons" id="fallback-buttons">
      <a href="https://discord.com/invite/CrzR7NTy3G" target="_blank" rel="noopener" class="btn btn-discord">💬 Ask on Discord</a>
    </div>
  </main>

  <script>
    const presets = document.querySelectorAll('.preset-btn');
    const chatBox = document.getElementById('chat-box');
    const fallback = document.getElementById('fallback-buttons');

    const responses = {
      "Gameplay Question": "Check the in-game tutorial first — most mechanics are explained there. Still stuck? The team answers gameplay questions directly on Discord.",
      "Payment Problem": "Double-check your payment method went through on your provider's end. If the charge succeeded but something's still wrong, reach us on Discord with your order details.",
      "Game Bug": "Sorry about that. Note exactly what you were doing when it happened, then share it on Discord — the more detail, the faster it gets fixed.",
      "Technical Help": "Start by restarting the game and confirming you're on the latest version. If that doesn't fix it, our team can dig in further on Discord.",
      "Other Inquiry": "For anything else, the fastest way to reach a real person is Discord."
    };

    presets.forEach(btn => {
      btn.addEventListener('click', () => {
        const issue = btn.getAttribute('data-issue');

        const userMsg = document.createElement('div');
        userMsg.classList.add('chat-message', 'user-msg');
        userMsg.textContent = issue;
        chatBox.appendChild(userMsg);

        const aiMsg = document.createElement('div');
        aiMsg.classList.add('chat-message', 'ai-msg');
        aiMsg.textContent = responses[issue] || "I'm not sure how to help with that one — try Discord.";
        chatBox.appendChild(aiMsg);

        chatBox.scrollTop = chatBox.scrollHeight;
        fallback.style.display = 'flex';
      });
    });
  </script>

</body>
</html>
