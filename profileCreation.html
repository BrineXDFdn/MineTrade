<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — MineTrade Interactive</title>
  <link rel="icon" href="Images/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body, html { height: 100%; }
    body {
      background:
        linear-gradient(rgba(11,13,16,0.75), rgba(11,13,16,0.92)),
        url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
    }

    main {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-box {
      background: rgba(18, 21, 26, 0.9);
      backdrop-filter: blur(10px);
      padding: 34px 28px;
      border-radius: var(--radius);
      border: 1px solid var(--line-bright);
      box-shadow: var(--shadow-glow);
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .auth-box h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .auth-box .sub { font-size: 0.85rem; color: var(--ink-faint); margin-bottom: 20px; }

    .auth-box input {
      width: 100%;
      padding: 11px 12px;
      margin: 7px 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line-bright);
      background: var(--void);
      color: var(--ink);
      font-size: 0.95rem;
      font-family: var(--font-body);
    }
    .auth-box input:focus { outline: 2px solid var(--cyan); outline-offset: 1px; }

    .auth-box .btn { width: 100%; margin-top: 12px; }

    .toggle-link {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--ink-dim);
      cursor: pointer;
      display: inline-block;
    }
    .toggle-link:hover { color: var(--cyan); text-decoration: underline; }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: var(--amber-soft);
      border: 1px solid var(--amber);
      color: var(--ink);
      font-size: 0.88rem;
      text-align: left;
      display: none;
    }
    .message a { color: var(--amber); font-weight: 600; }
  </style>
</head>
<body>

  <header class="top-bar">
    <a href="index.html" class="back-link" aria-label="Back to Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Home
    </a>
    <a href="index.html" class="brand"><span class="mark">⛏</span>&nbsp;MineTrade<span class="dot">.</span></a>
    <span style="width:60px;"></span>
  </header>

  <main>
    <div class="auth-box" id="authBox">
      <h1 id="formTitle">Create your account</h1>
      <p class="sub">Save your SquareScape stats and settings.</p>

      <div id="signupForm">
        <input type="text" id="signupName" placeholder="Name" required />
        <input type="email" id="signupEmail" placeholder="Email" required />
        <input type="password" id="signupPassword" placeholder="Password" required />
        <button class="btn btn-primary" onclick="showMessage()">Sign up</button>
        <div class="toggle-link" onclick="toggleForm()">Already have an account? Log in</div>
      </div>

      <div id="loginForm" style="display: none;">
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button class="btn btn-primary" onclick="showMessage()">Log in</button>
        <div class="toggle-link" onclick="toggleForm()">Don't have an account? Sign up</div>
      </div>

      <div id="message" class="message">
        Accounts aren't live yet — this page is a preview of what's coming.
        Want in early or have a question? <a href="https://discord.gg/CrzR7NTy3G" target="_blank" rel="noopener">Join the Discord</a>.
      </div>
    </div>
  </main>

  <script>
    function toggleForm() {
      const signupForm = document.getElementById('signupForm');
      const loginForm = document.getElementById('loginForm');
      const formTitle = document.getElementById('formTitle');
      const message = document.getElementById('message');
      message.style.display = 'none';
      if (signupForm.style.display === 'none') {
        signupForm.style.display = 'block';
        loginForm.style.display = 'none';
        formTitle.textContent = 'Create your account';
      } else {
        signupForm.style.display = 'none';
        loginForm.style.display = 'block';
        formTitle.textContent = 'Welcome back';
      }
    }

    function showMessage() {
      document.getElementById('message').style.display = 'block';
    }
  </script>

</body>
</html>
